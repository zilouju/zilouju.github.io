<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="zilouju 橘子楼">
  <title>橘子楼 · zilouju</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%8A%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff9f2;
      --bg-warm: #fff3e6;
      --surface: #ffffff;
      --coral: #ff6b4a;
      --coral-soft: rgba(255, 107, 74, 0.12);
      --teal: #2ec4b6;
      --teal-soft: rgba(46, 196, 182, 0.12);
      --sun: #ffd166;
      --sun-soft: rgba(255, 209, 102, 0.35);
      --sky: #4ecdc4;
      --text: #2d3436;
      --text-muted: #636e72;
      --border: #f0e6dc;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(255, 107, 74, 0.08);
      --shadow-hover: 0 6px 24px rgba(255, 107, 74, 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg) url('./assets/anime-yiren-bg.png') center center / cover fixed no-repeat;
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 249, 242, 0.72) 0%, rgba(255, 249, 242, 0.86) 100%),
        radial-gradient(ellipse 60% 40% at 90% 5%, var(--sun-soft) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 5% 90%, var(--teal-soft) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
      align-items: flex-start;
    }

    .sidebar {
      width: 168px;
      flex-shrink: 0;
      position: sticky;
      top: 1rem;
    }

    .sidebar-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
      padding-left: 0.65rem;
    }

    .category-nav {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .category-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      padding: 0.62rem 0.75rem;
      border: 1px solid transparent;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
    }

    .category-btn:hover {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .category-btn.active {
      background: var(--surface);
      border-color: var(--coral);
      color: var(--coral);
      box-shadow: var(--shadow);
    }

    .category-label { display: flex; align-items: center; gap: 0.4rem; min-width: 0; }
    .category-icon { flex-shrink: 0; font-size: 0.95rem; }

    .category-count {
      flex-shrink: 0;
      min-width: 1.35rem;
      padding: 0.1rem 0.35rem;
      border-radius: 999px;
      background: var(--bg-warm);
      font-size: 0.68rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-muted);
    }

    .category-btn.active .category-count {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .app { position: relative; flex: 1; min-width: 0; max-width: 620px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0 1.25rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--coral);
    }

    .logo-icon { font-size: 1.5rem; }

    .header-actions { display: flex; gap: 0.5rem; }

    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 2px solid;
      border-color: #fff8f0 #b8956e #9a7a58 #e8d5bc;
      border-radius: 5px;
      background: linear-gradient(180deg, #f8ead8 0%, #e8d4b8 45%, #dcc4a4 100%);
      box-shadow:
        1px 1px 0 rgba(120, 80, 40, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);
      cursor: pointer;
      color: #7a5c3a;
      transition: color 0.15s, box-shadow 0.1s, border-color 0.1s;
    }

    .icon-btn-svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .icon-btn:hover {
      color: #c45c2a;
      border-color: #fffaf4 #c9a07a #a88462 #f0e0cc;
    }

    .icon-btn:active {
      border-color: #9a7a58 #fff8f0 #e8d5bc #b8956e;
      background: linear-gradient(180deg, #dcc4a4 0%, #e8d4b8 55%, #f0e0cc 100%);
      box-shadow: inset 1px 1px 3px rgba(80, 50, 20, 0.35);
      transform: translateY(1px);
    }

    /* Compose */
    .compose {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .compose textarea {
      width: 100%;
      min-height: 88px;
      border: none;
      outline: none;
      resize: vertical;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      background: transparent;
    }

    .compose textarea::placeholder { color: #b2bec3; }

    .compose-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.65rem;
      flex-wrap: wrap;
    }

    .compose-category-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .compose-category-hint strong { color: var(--coral); font-weight: 600; }

    .btn-image {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.7rem;
      border: 1px dashed var(--border);
      border-radius: 999px;
      background: var(--bg-warm);
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-image:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }
    .btn-image:disabled { opacity: 0.45; cursor: not-allowed; }

    .compose-images {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.65rem;
    }

    .compose-images:empty { display: none; }

    .compose-image-item {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .compose-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .compose-image-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 50%;
      background: rgba(45, 52, 54, 0.72);
      color: #fff;
      font-size: 0.75rem;
      line-height: 1;
      cursor: pointer;
    }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .char-count { font-size: 0.8rem; color: var(--text-muted); }

    .post-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .post-image {
      display: block;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 1;
      background: var(--bg-warm);
    }

    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.2s;
    }

    .post-image:hover img { transform: scale(1.03); }

    .post-category-tag {
      display: inline-block;
      margin-right: 0.45rem;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: var(--coral-soft);
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--coral);
      vertical-align: middle;
    }

    .btn {
      padding: 0.5rem 1.15rem;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--coral) 0%, #ff8f6b 100%);
      color: #fff;
      box-shadow: 0 3px 12px rgba(255, 107, 74, 0.3);
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(255, 107, 74, 0.4); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }

    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }

    .btn-danger { color: #e17055; border-color: #ffeaa7; }
    .btn-danger:hover { background: #fff5f5; border-color: #e17055; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      border-radius: 10px;
      background: var(--bg-warm);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .status-bar.readonly { background: var(--sun-soft); border-color: #ffe08a; }
    .status-bar.ready { background: var(--teal-soft); border-color: #a8e6cf; color: #00b894; }
    .status-bar.error { background: #ffeef0; border-color: #ffb8c0; color: #d63031; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .operation-progress {
      margin: -0.35rem 0 1rem;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .operation-progress[hidden] { display: none; }

    .operation-progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.45rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .operation-progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--bg-warm);
    }

    .operation-progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal) 0%, var(--coral) 100%);
      transition: width 0.25s ease;
    }

    /* Feed */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .feed-title { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }

    .feed-count { font-size: 0.78rem; color: var(--text-muted); }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem;
      margin-bottom: 0.85rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    .post-card:hover { box-shadow: var(--shadow-hover); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .post-time { font-size: 0.78rem; color: var(--text-muted); }

    .post-actions { display: flex; gap: 0.35rem; }

    .post-content {
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.75rem;
    }

    .post-content.editing textarea {
      width: 100%;
      min-height: 72px;
      padding: 0.6rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
    }

    .post-content.editing textarea:focus { border-color: var(--teal); }

    .edit-actions { display: flex; gap: 0.4rem; margin-top: 0.5rem; }

    /* Comments */
    .comments-section { border-top: 1px solid var(--border); padding-top: 0.75rem; }

    .comments-toggle {
      font-size: 0.82rem;
      color: var(--teal);
      cursor: pointer;
      font-weight: 500;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }

    .comments-toggle:hover { text-decoration: underline; }

    .comments-list { margin-top: 0.65rem; }

    .comment-item {
      display: flex;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border-bottom: 1px dashed var(--border);
    }

    .comment-item:last-child { border-bottom: none; }

    .comment-body { flex: 1; min-width: 0; }

    .comment-text { font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; }

    .comment-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }

    .comment-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }

    .comment-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.65rem;
    }

    .comment-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }

    .comment-form input:focus { border-color: var(--teal); }

    /* Load more */
    .load-more-wrap { text-align: center; padding: 0.75rem 0; }

    .load-more-wrap .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 52, 54, 0.35);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s;
    }

    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: min(420px, 100%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      transform: translateY(12px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }

    .modal p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.6; }

    .modal input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      outline: none;
    }

    .modal input:focus { border-color: var(--teal); }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .modal a { color: var(--teal); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      z-index: 300;
      transition: transform 0.3s;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(45, 52, 54, 0.82);
      backdrop-filter: blur(6px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.22s;
      cursor: zoom-out;
    }

    .image-lightbox.open { opacity: 1; visibility: visible; }

    .image-lightbox img {
      max-width: min(92vw, 900px);
      max-height: 88vh;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 768px) {
      .layout { flex-direction: column; gap: 1rem; }
      .sidebar { width: 100%; position: static; }
      .category-nav {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 0.25rem;
        -webkit-overflow-scrolling: touch;
      }
      .category-btn { width: auto; flex-shrink: 0; white-space: nowrap; }
      .sidebar-title { display: none; }
    }

    @media (max-width: 480px) {
      .post-actions .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.72rem; }
      .comment-form { flex-direction: column; }
      .comment-form .btn { align-self: flex-end; }
      .post-images { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">分类</div>
      <nav class="category-nav" id="category-nav" aria-label="博客分类"></nav>
    </aside>

    <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">☀️</span>
        <span>橘子楼</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-refresh" title="刷新" type="button">
          <svg class="icon-btn-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.5-5.8L19 8"/>
            <path d="M20 12a8 8 0 0 1-13.5 5.8L5 16"/>
            <polyline points="19 3 19 8 14 8"/>
            <polyline points="5 21 5 16 10 16"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-settings" title="设置" type="button">
          <svg class="icon-btn-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.77 1.02 1.41 1.1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="status-bar readonly" id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">正在加载…</span>
    </div>
    <div class="operation-progress" id="operation-progress" hidden>
      <div class="operation-progress-text">
        <span id="operation-progress-label">正在保存…</span>
        <span id="operation-progress-percent">0%</span>
      </div>
      <div class="operation-progress-track">
        <div class="operation-progress-bar" id="operation-progress-bar"></div>
      </div>
    </div>

    <section class="compose" id="compose-section">
      <textarea id="compose-input" placeholder="分享此刻的想法，像夏日微风一样轻松…" maxlength="500"></textarea>
      <div class="compose-toolbar">
        <button class="btn-image" id="btn-add-image" type="button" disabled>📷 添加图片</button>
        <span class="compose-category-hint">发布到 <strong id="compose-category-label">日常微博</strong></span>
        <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden>
      </div>
      <div class="compose-images" id="compose-images"></div>
      <div class="compose-footer">
        <span class="char-count"><span id="char-count">0</span>/500</span>
        <button class="btn btn-primary" id="btn-post" type="button" disabled>发布</button>
      </div>
    </section>

    <section>
      <div class="feed-header">
        <span class="feed-title" id="feed-title">日常微博</span>
        <span class="feed-count" id="feed-count"></span>
      </div>
      <div id="feed"></div>
      <div class="load-more-wrap" id="load-more-wrap" hidden>
        <button class="btn btn-ghost" id="btn-load-more" type="button">加载更多</button>
        <p class="hint" id="load-hint"></p>
      </div>
    </section>
    </div>
  </div>

  <div class="image-lightbox" id="image-lightbox" hidden>
    <img id="lightbox-img" src="" alt="">
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h3>⚙️ 发布设置</h3>
      <p>发帖、评论、编辑和删除需要 GitHub Token，数据保存在仓库的 JSON 文件中。Token 仅存储在本地浏览器，不会上传。</p>
      <p>创建 Token：<a href="https://github.com/settings/tokens/new?scopes=repo&description=weibo-pages" target="_blank" rel="noopener">GitHub → Settings → Tokens</a>，勾选 <strong>repo</strong> 权限。</p>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-modal-cancel" type="button">取消</button>
        <button class="btn btn-primary" id="btn-modal-save" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ── Config ── */
    const CONFIG = {
      owner: 'zilouju',
      repo: 'zilouju.github.io',
      recentFile: 'data/posts-recent.json',
      archiveFile: 'data/posts-archive.json',
      recentLimit: 20,
      pageSize: 8,
      archiveChunk: 10,
      tokenKey: 'weibo_github_token',
      draftKey: 'weibo_compose_draft',
      categoryKey: 'weibo_active_category',
      defaultCategory: 'daily',
      maxImages: 4,
      maxImageSize: 2 * 1024 * 1024,
      categories: [
        { id: 'daily', label: '日常微博', icon: '📝' },
        { id: 'blog', label: '博客文章', icon: '📖' },
        { id: 'note', label: '学习笔记', icon: '💡' },
        { id: 'photo', label: '相册图集', icon: '📷' },
      ],
    };

    /* ── State ── */
    const state = {
      recent: [],
      archive: null,
      fileMeta: {},
      displayed: [],
      categoryShown: 0,
      activeCategory: localStorage.getItem(CONFIG.categoryKey) || CONFIG.defaultCategory,
      pendingImages: [],
      expandedComments: new Set(),
      editingPost: null,
      editingComment: null,
      loading: false,
      archiveLoading: false,
      operationActive: false,
      operationTimer: null,
      operationProgress: 0,
    };

    /* ── DOM ── */
    const $ = (id) => document.getElementById(id);
    const feed = $('feed');
    const composeInput = $('compose-input');
    const btnPost = $('btn-post');
    const statusBar = $('status-bar');
    const statusText = $('status-text');
    const operationProgress = $('operation-progress');
    const operationProgressLabel = $('operation-progress-label');
    const operationProgressPercent = $('operation-progress-percent');
    const operationProgressBar = $('operation-progress-bar');
    const categoryNav = $('category-nav');
    const composeImages = $('compose-images');
    const imageInput = $('image-input');
    const imageLightbox = $('image-lightbox');
    const lightboxImg = $('lightbox-img');

    /* ── Utils ── */
    function getCategoryMeta(id) {
      return CONFIG.categories.find((c) => c.id === id)
        || CONFIG.categories.find((c) => c.id === CONFIG.defaultCategory);
    }

    function getPostCategory(post) {
      return post.category || CONFIG.defaultCategory;
    }

    function getAvailablePosts() {
      return sortPosts([...state.recent, ...(state.archive || [])]);
    }

    function getFilteredPosts() {
      return getAvailablePosts().filter((p) => getPostCategory(p) === state.activeCategory);
    }

    function countPostsByCategory(categoryId) {
      return getAvailablePosts().filter((p) => getPostCategory(p) === categoryId).length;
    }
    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
    }

    function getToken() {
      return localStorage.getItem(CONFIG.tokenKey) || '';
    }

    function canWrite() {
      return !!getToken();
    }

    function toast(msg, duration = 2500) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }

    function setOperationProgress(value, label) {
      state.operationProgress = Math.max(0, Math.min(100, value));
      operationProgressBar.style.width = `${state.operationProgress}%`;
      operationProgressPercent.textContent = `${Math.round(state.operationProgress)}%`;
      if (label) operationProgressLabel.textContent = label;
    }

    function startOperation(label) {
      clearInterval(state.operationTimer);
      state.operationActive = true;
      updateComposeState();
      operationProgress.hidden = false;
      setOperationProgress(8, label);
      state.operationTimer = setInterval(() => {
        const next = state.operationProgress + Math.max(1, (88 - state.operationProgress) * 0.18);
        setOperationProgress(Math.min(next, 88));
      }, 350);
    }

    function stopOperation(label) {
      clearInterval(state.operationTimer);
      state.operationTimer = null;
      setOperationProgress(100, label);
      setTimeout(() => {
        if (!state.operationTimer) operationProgress.hidden = true;
      }, 650);
      state.operationActive = false;
      updateComposeState();
    }

    async function withOperationProgress(label, successLabel, task) {
      if (state.operationActive) throw new Error('请等待当前操作完成');
      startOperation(label);
      try {
        const result = await task();
        stopOperation(successLabel);
        return result;
      } catch (err) {
        clearInterval(state.operationTimer);
        state.operationTimer = null;
        state.operationActive = false;
        updateComposeState();
        operationProgress.hidden = true;
        throw err;
      }
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      const date = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      return `${date} ${time}`;
    }

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    /** 是否为 UTF-8 被误读为 Latin-1 的乱码（含双重编码的中间态） */
    function looksLikeMojibake(str) {
      return /[\u0080-\u00ff]/.test(str) && !/[\u4e00-\u9fff]/.test(str);
    }

    /** 修复 UTF-8 被误读为 Latin-1 的历史乱码（支持双重编码） */
    function fixMojibake(str) {
      if (!str || /^[\x00-\x7F]*$/.test(str)) return str;
      if (!looksLikeMojibake(str)) return str;
      let cur = str;
      for (let pass = 0; pass < 3; pass++) {
        if (!looksLikeMojibake(cur)) break;
        try {
          const bytes = Uint8Array.from(cur, (c) => c.charCodeAt(0) & 0xff);
          const fixed = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
          if (fixed === cur) break;
          cur = fixed;
        } catch { break; }
      }
      return cur;
    }

    function normalizePosts(posts) {
      return posts.map((p) => ({
        ...p,
        category: p.category || CONFIG.defaultCategory,
        content: fixMojibake(p.content || ''),
        images: Array.isArray(p.images) ? p.images : [],
        comments: (p.comments || []).map((c) => ({
          ...c,
          content: fixMojibake(c.content),
        })),
      }));
    }

    function updateStatus() {
      if (canWrite()) {
        statusBar.className = 'status-bar ready';
        statusText.textContent = '已连接 · 可以发帖、评论和编辑';
        composeInput.disabled = false;
      } else {
        statusBar.className = 'status-bar readonly';
        statusText.textContent = '只读模式 · 点击 ⚙️ 配置 Token 后可发帖';
        composeInput.disabled = false;
      }
      updateComposeState();
    }

    function updateComposeState() {
      $('char-count').textContent = composeInput.value.length;
      const hasContent = composeInput.value.trim() || state.pendingImages.length > 0;
      const busy = state.loading || state.operationActive;
      btnPost.disabled = !hasContent || busy;
      $('btn-add-image').disabled = busy || !canWrite()
        || state.pendingImages.length >= CONFIG.maxImages;
    }

    function updateComposeCategoryLabel() {
      const meta = getCategoryMeta(state.activeCategory);
      $('compose-category-label').textContent = meta?.label || '日常微博';
      $('feed-title').textContent = meta?.label || '日常微博';
    }

    function renderCategoryNav() {
      categoryNav.innerHTML = CONFIG.categories.map((cat) => {
        const count = countPostsByCategory(cat.id);
        const active = state.activeCategory === cat.id ? ' active' : '';
        return `
          <button class="category-btn${active}" type="button" data-category="${cat.id}">
            <span class="category-label">
              <span class="category-icon">${cat.icon}</span>
              <span>${cat.label}</span>
            </span>
            <span class="category-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function setActiveCategory(categoryId) {
      if (!getCategoryMeta(categoryId)) return;
      state.activeCategory = categoryId;
      localStorage.setItem(CONFIG.categoryKey, categoryId);
      state.displayed = [];
      state.categoryShown = 0;
      state.expandedComments.clear();
      updateComposeCategoryLabel();
      renderCategoryNav();
      renderNextPage();
    }

    function revokePendingImageUrls() {
      state.pendingImages.forEach((item) => {
        if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
      });
    }

    function clearPendingImages() {
      revokePendingImageUrls();
      state.pendingImages = [];
      composeImages.innerHTML = '';
      imageInput.value = '';
      updateComposeState();
    }

    function renderPendingImages() {
      composeImages.innerHTML = state.pendingImages.map((item, index) => `
        <div class="compose-image-item">
          <img src="${item.previewUrl}" alt="待发布图片">
          <button class="compose-image-remove" type="button" data-remove-image="${index}" aria-label="移除图片">×</button>
        </div>
      `).join('');
    }

    function addPendingImages(files) {
      const remain = CONFIG.maxImages - state.pendingImages.length;
      if (remain <= 0) {
        toast(`最多添加 ${CONFIG.maxImages} 张图片`);
        return;
      }
      for (const file of Array.from(files).slice(0, remain)) {
        if (!file.type.startsWith('image/')) {
          toast('仅支持图片文件');
          continue;
        }
        if (file.size > CONFIG.maxImageSize) {
          toast('单张图片不能超过 2MB');
          continue;
        }
        state.pendingImages.push({
          file,
          previewUrl: URL.createObjectURL(file),
        });
      }
      renderPendingImages();
      updateComposeState();
    }

    function openLightbox(src) {
      lightboxImg.src = src;
      imageLightbox.hidden = false;
      requestAnimationFrame(() => imageLightbox.classList.add('open'));
    }

    function closeLightbox() {
      imageLightbox.classList.remove('open');
      setTimeout(() => {
        imageLightbox.hidden = true;
        lightboxImg.src = '';
      }, 220);
    }

    function renderPostImages(images) {
      if (!images?.length) return '';
      return `
        <div class="post-images">
          ${images.map((src) => `
            <a class="post-image" href="${escapeHtml(src)}" data-lightbox="${escapeHtml(src)}">
              <img src="${escapeHtml(src)}" alt="配图" loading="lazy">
            </a>
          `).join('')}
        </div>
      `;
    }

    function saveComposeDraft() {
      const value = composeInput.value;
      if (value) localStorage.setItem(CONFIG.draftKey, value);
      else localStorage.removeItem(CONFIG.draftKey);
    }

    function clearComposeDraft() {
      localStorage.removeItem(CONFIG.draftKey);
    }

    function restoreComposeDraft() {
      const draft = localStorage.getItem(CONFIG.draftKey);
      if (!draft || composeInput.value) return;
      const maxLength = composeInput.maxLength > 0 ? composeInput.maxLength : draft.length;
      composeInput.value = draft.slice(0, maxLength);
      updateComposeState();
      toast('已恢复上次未发布的草稿');
    }

    /* ── UTF-8 Base64（GitHub API 读写中文必用） ── */
    function encodeBase64Utf8(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\n/g, ''));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }

    /* ── Data I/O ── */
    async function fetchJsonLocal(path) {
      const res = await fetch(`./${path}?t=${Date.now()}`);
      if (!res.ok) throw new Error(`无法读取 ${path}`);
      const text = new TextDecoder('utf-8').decode(await res.arrayBuffer());
      return JSON.parse(text);
    }

    async function prefetchFileSha(path) {
      const token = getToken();
      if (!token) return;
      const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
      );
      if (res.ok) {
        const data = await res.json();
        state.fileMeta[path] = { sha: data.sha };
      }
    }

    async function fetchJsonGitHub(path) {
      const token = getToken();
      const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
        { headers: token ? { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } : {} }
      );
      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const data = await res.json();
      state.fileMeta[path] = { sha: data.sha };
      return JSON.parse(decodeBase64Utf8(data.content));
    }

    /** 读取：有 Token 时走 GitHub API，避免 GitHub Pages/CDN 缓存导致刷新后读到旧数据 */
    async function readFile(path) {
      if (canWrite()) {
        try { return await fetchJsonGitHub(path); }
        catch { /* fallback to static */ }
      }
      return fetchJsonLocal(path);
    }

    /** 有 Token 时从 API 拉最新数据（发帖保存后用，避免 CDN 缓存滞后） */
    async function readFileFresh(path) {
      if (canWrite()) {
        try { return await fetchJsonGitHub(path); }
        catch { /* fallback */ }
      }
      return fetchJsonLocal(path);
    }

    function isShaConflict(message, status) {
      const msg = message || '';
      return status === 409
        || /does not match/i.test(msg)
        || /sha/i.test(msg);
    }

    async function writeFile(path, content, maxRetry = 3) {
      const token = getToken();
      if (!token) throw new Error('请先配置 GitHub Token');

      const payload = encodeBase64Utf8(JSON.stringify(content, null, 2));
      let lastError = '保存失败';

      for (let attempt = 0; attempt < maxRetry; attempt++) {
        if (!state.fileMeta[path]?.sha) {
          await prefetchFileSha(path);
        }

        const body = {
          message: `weibo: update ${path}`,
          content: payload,
        };
        if (state.fileMeta[path]?.sha) body.sha = state.fileMeta[path].sha;

        const res = await fetch(
          `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
              Accept: 'application/vnd.github+json',
            },
            body: JSON.stringify(body),
          }
        );

        if (res.ok) {
          const data = await res.json();
          state.fileMeta[path] = { sha: data.content.sha };
          return;
        }

        const err = await res.json().catch(() => ({}));
        lastError = err.message || `保存失败 (${res.status})`;

        if (!isShaConflict(lastError, res.status) || attempt === maxRetry - 1) {
          throw new Error(lastError);
        }
        delete state.fileMeta[path];
        await new Promise((r) => setTimeout(r, 400 * (attempt + 1)));
      }

      throw new Error(lastError);
    }

    async function putBinaryFile(path, base64Content, message) {
      const token = getToken();
      if (!token) throw new Error('请先配置 GitHub Token');

      let lastError = '图片上传失败';
      for (let attempt = 0; attempt < 3; attempt++) {
        if (!state.fileMeta[path]?.sha) await prefetchFileSha(path);

        const body = {
          message: message || `weibo: upload ${path}`,
          content: base64Content,
        };
        if (state.fileMeta[path]?.sha) body.sha = state.fileMeta[path].sha;

        const res = await fetch(
          `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
              Accept: 'application/vnd.github+json',
            },
            body: JSON.stringify(body),
          }
        );

        if (res.ok) {
          const data = await res.json();
          state.fileMeta[path] = { sha: data.content.sha };
          return `./${path}`;
        }

        const err = await res.json().catch(() => ({}));
        lastError = err.message || `图片上传失败 (${res.status})`;
        if (!isShaConflict(lastError, res.status) || attempt === 2) throw new Error(lastError);
        delete state.fileMeta[path];
        await new Promise((r) => setTimeout(r, 400 * (attempt + 1)));
      }
      throw new Error(lastError);
    }

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function imageExtension(file) {
      const map = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/gif': 'gif', 'image/webp': 'webp' };
      return map[file.type] || (file.name.split('.').pop() || 'jpg').toLowerCase();
    }

    async function uploadImages(files, postId) {
      const paths = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const ext = imageExtension(file);
        const path = `assets/images/${postId}_${i}.${ext}`;
        const base64 = await fileToBase64(file);
        const url = await putBinaryFile(path, base64, `weibo: add image ${path}`);
        paths.push(url.replace(/^\.\//, ''));
      }
      return paths;
    }

    function sortPosts(posts) {
      return [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }

    /* ── Load ── */
    async function loadRecent() {
      state.recent = sortPosts(normalizePosts(await readFile(CONFIG.recentFile)));
    }

    async function loadArchive(silent = false) {
      if (state.archive !== null) return;
      if (!silent) {
        state.archiveLoading = true;
        updateLoadMoreUI();
      }
      try {
        state.archive = sortPosts(normalizePosts(await readFile(CONFIG.archiveFile)));
      } catch {
        state.archive = [];
      }
      if (!silent) {
        state.archiveLoading = false;
      }
    }

    /** 写入前必须加载归档，否则 getAllPosts() 会丢历史数据 */
    async function ensureArchiveLoaded() {
      await loadArchive(true);
    }

    async function getAllPostsForWrite() {
      if (state.archive === null && state.recent.length < CONFIG.recentLimit) {
        return getAllPosts();
      }
      await ensureArchiveLoaded();
      return getAllPosts();
    }

    async function init() {
      statusText.textContent = '正在加载最新动态…';
      try {
        await loadRecent();
        if (!getCategoryMeta(state.activeCategory)) {
          state.activeCategory = CONFIG.defaultCategory;
        }
        state.displayed = [];
        state.categoryShown = 0;
        updateComposeCategoryLabel();
        renderCategoryNav();
        renderNextPage();
        updateStatus();
        restoreComposeDraft();
      } catch (e) {
        statusBar.className = 'status-bar error';
        statusText.textContent = '加载失败：' + e.message;
        feed.innerHTML = `<div class="empty-state"><div class="emoji">😢</div><p>无法加载数据，请稍后刷新</p></div>`;
      }
    }

    /* ── Pagination ── */
    function renderNextPage() {
      const filtered = getFilteredPosts();
      const toAdd = filtered.slice(state.categoryShown, state.categoryShown + CONFIG.pageSize);
      state.displayed.push(...toAdd);
      state.categoryShown += toAdd.length;
      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
      renderCategoryNav();
    }

    function updateFeedCount() {
      const filtered = getFilteredPosts();
      const shown = state.displayed.length;
      $('feed-count').textContent = filtered.length > 0 ? `已显示 ${shown} / ${filtered.length}` : '';
    }

    function updateLoadMoreUI() {
      const wrap = $('load-more-wrap');
      const filtered = getFilteredPosts();
      const hasMoreInMemory = state.categoryShown < filtered.length;
      const archiveNotLoaded = state.archive === null && state.recent.length >= CONFIG.recentLimit;

      if (state.archiveLoading) {
        wrap.hidden = false;
        $('btn-load-more').hidden = true;
        $('load-hint').innerHTML = '<span class="loading"><span class="spinner"></span>正在加载历史记录…</span>';
        return;
      }

      if (hasMoreInMemory || archiveNotLoaded) {
        wrap.hidden = false;
        $('btn-load-more').hidden = false;
        $('load-hint').textContent = archiveNotLoaded && !hasMoreInMemory
          ? '历史记录较多，点击后将加载归档内容'
          : '';
      } else {
        wrap.hidden = state.displayed.length === 0;
        $('btn-load-more').hidden = true;
        $('load-hint').textContent = state.displayed.length > 0 ? '— 已到底啦 —' : '';
      }
    }

    async function handleLoadMore() {
      let filtered = getFilteredPosts();

      if (state.categoryShown < filtered.length) {
        const toAdd = filtered.slice(state.categoryShown, state.categoryShown + CONFIG.pageSize);
        state.displayed.push(...toAdd);
        state.categoryShown += toAdd.length;
      } else if (state.archive === null && state.recent.length >= CONFIG.recentLimit) {
        await loadArchive();
        filtered = getFilteredPosts();
        const toAdd = filtered.slice(state.categoryShown, state.categoryShown + CONFIG.archiveChunk);
        state.displayed.push(...toAdd);
        state.categoryShown += toAdd.length;
      }

      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
      renderCategoryNav();
    }

    /* ── Persist helpers ── */
    function postsEqual(a, b) {
      return JSON.stringify(a || []) === JSON.stringify(b || []);
    }

    function applyPostsToState(recent, archive) {
      state.recent = sortPosts(recent);
      if (archive !== undefined) state.archive = sortPosts(archive);
    }

    async function persistPostFiles(normRecent, normArchive, archiveChanged) {
      await writeFile(CONFIG.recentFile, normRecent);
      if (normArchive !== undefined && archiveChanged) {
        await writeFile(CONFIG.archiveFile, normArchive);
      }
    }

    async function saveAll(recent, archive) {
      const normRecent = normalizePosts(recent);
      const normArchive = archive !== undefined ? normalizePosts(archive) : undefined;
      const archiveChanged = normArchive !== undefined && !postsEqual(normArchive, state.archive);
      await persistPostFiles(normRecent, normArchive, archiveChanged);
      applyPostsToState(normRecent, normArchive);
    }

    function findPost(id) {
      return state.displayed.find(p => p.id === id)
        || state.recent.find(p => p.id === id)
        || (state.archive || []).find(p => p.id === id);
    }

    function getAllPosts() {
      return sortPosts([...state.recent, ...(state.archive || [])]);
    }

    function splitRecentArchive(allPosts) {
      const sorted = sortPosts(allPosts);
      const recent = sorted.slice(0, CONFIG.recentLimit);
      const archive = sorted.slice(CONFIG.recentLimit);
      return { recent, archive };
    }

    async function persistPosts(allPosts) {
      const { recent, archive } = splitRecentArchive(allPosts);
      try {
        await saveAll(recent, archive);
      } catch (err) {
        if (!isShaConflict(err.message)) throw err;
        state.fileMeta = {};
        state.recent = sortPosts(normalizePosts(await readFileFresh(CONFIG.recentFile)));
        if (state.archive !== null) {
          state.archive = sortPosts(normalizePosts(await readFileFresh(CONFIG.archiveFile)));
        }
        const merged = sortPosts([...allPosts, ...getAllPosts()])
          .filter((p, i, arr) => arr.findIndex((x) => x.id === p.id) === i);
        const split = splitRecentArchive(merged);
        await saveAll(split.recent, split.archive);
      }
    }

    /* ── CRUD: Posts ── */
    async function createPost(content, imageFiles = []) {
      await withOperationProgress('正在发布到 GitHub…', '发布完成', async () => {
        const postId = uid('post');
        let images = [];
        if (imageFiles.length > 0) {
          setOperationProgress(28, '正在上传图片…');
          images = await uploadImages(imageFiles, postId);
        }
        const post = {
          id: postId,
          category: state.activeCategory,
          content: content.trim(),
          images,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          comments: [],
        };
        const all = [post, ...(await getAllPostsForWrite())];
        const { recent, archive } = splitRecentArchive(all);
        await saveAll(recent, archive);
        const displayCount = getPostCategory(post) === state.activeCategory
          ? state.displayed.length + 1
          : state.displayed.length;
        reloadViewFromState(displayCount);
      });
      toast('发布成功 ☀️');
    }

    async function updatePost(id, content) {
      await withOperationProgress('正在保存编辑…', '保存完成', async () => {
        const all = (await getAllPostsForWrite()).map(p =>
          p.id === id ? { ...p, content: content.trim(), updatedAt: new Date().toISOString() } : p
        );
        await persistPosts(all);
        await reloadAndKeepView();
      });
      toast('已更新');
    }

    async function deletePost(id) {
      if (!confirm('确定删除这条动态？评论也会一并删除。')) return;
      await withOperationProgress('正在从 GitHub 删除…', '删除完成', async () => {
        const all = (await getAllPostsForWrite()).filter(p => p.id !== id);
        const { recent, archive } = splitRecentArchive(all);
        await saveAll(recent, archive);
        reloadViewFromState(state.displayed.filter(p => p.id !== id).length);
      });
      toast('已删除');
    }

    /* ── CRUD: Comments ── */
    async function addComment(postId, content) {
      await withOperationProgress('正在保存评论…', '评论保存完成', async () => {
        const all = (await getAllPostsForWrite()).map(p => {
          if (p.id !== postId) return p;
          return {
            ...p,
            comments: [...(p.comments || []), {
              id: uid('cmt'),
              content: content.trim(),
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            }],
          };
        });
        await persistPosts(all);
        await reloadAndKeepView();
        state.expandedComments.add(postId);
        renderFeed();
      });
      toast('评论成功');
    }

    async function updateComment(postId, commentId, content) {
      await withOperationProgress('正在保存评论编辑…', '评论保存完成', async () => {
        const all = (await getAllPostsForWrite()).map(p => {
          if (p.id !== postId) return p;
          return {
            ...p,
            comments: (p.comments || []).map(c =>
              c.id === commentId ? { ...c, content: content.trim(), updatedAt: new Date().toISOString() } : c
            ),
          };
        });
        await persistPosts(all);
        await reloadAndKeepView();
        state.expandedComments.add(postId);
        renderFeed();
      });
      toast('评论已更新');
    }

    async function deleteComment(postId, commentId) {
      if (!confirm('确定删除这条评论？')) return;
      await withOperationProgress('正在删除评论…', '评论删除完成', async () => {
        const all = (await getAllPostsForWrite()).map(p => {
          if (p.id !== postId) return p;
          return { ...p, comments: (p.comments || []).filter(c => c.id !== commentId) };
        });
        await persistPosts(all);
        await reloadAndKeepView();
        state.expandedComments.add(postId);
        renderFeed();
      });
      toast('评论已删除');
    }

    function reloadViewFromState(count) {
      const filtered = getFilteredPosts();
      state.displayed = filtered.slice(0, count);
      state.categoryShown = state.displayed.length;
      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
      renderCategoryNav();
    }

    async function reloadAndKeepView() {
      const count = state.displayed.length;
      reloadViewFromState(count);
    }

    /* ── Render ── */
    function renderPostCard(post) {
      const isEditing = state.editingPost === post.id;
      const commentsOpen = state.expandedComments.has(post.id);
      const comments = post.comments || [];
      const write = canWrite();

      const postActions = write ? `
        <button class="btn btn-ghost btn-sm" data-action="edit-post" data-id="${post.id}" type="button">编辑</button>
        <button class="btn btn-ghost btn-sm btn-danger" data-action="delete-post" data-id="${post.id}" type="button">删除</button>
      ` : '';

      const contentHtml = isEditing ? `
        <div class="post-content editing">
          ${renderPostImages(post.images)}
          <textarea data-edit-post="${post.id}">${escapeHtml(post.content)}</textarea>
          <div class="edit-actions">
            <button class="btn btn-primary btn-sm" data-action="save-post" data-id="${post.id}" type="button">保存</button>
            <button class="btn btn-ghost btn-sm" data-action="cancel-edit" type="button">取消</button>
          </div>
        </div>
      ` : `${renderPostImages(post.images)}${post.content ? `<div class="post-content">${escapeHtml(post.content)}</div>` : ''}`;

      const catMeta = getCategoryMeta(getPostCategory(post));
      const categoryTag = catMeta
        ? `<span class="post-category-tag">${catMeta.icon} ${catMeta.label}</span>`
        : '';

      const commentsHtml = commentsOpen ? `
        <div class="comments-list">
          ${comments.map(c => renderComment(post.id, c)).join('')}
        </div>
        ${write ? `
          <div class="comment-form">
            <input type="text" placeholder="写评论…" data-comment-input="${post.id}" maxlength="300">
            <button class="btn btn-primary btn-sm" data-action="add-comment" data-id="${post.id}" type="button">发送</button>
          </div>
        ` : ''}
      ` : '';

      return `
        <article class="post-card" data-post="${post.id}">
          <div class="post-meta">
            <span class="post-time">${categoryTag}${formatTime(post.updatedAt || post.createdAt)}${post.updatedAt !== post.createdAt ? ' · 已编辑' : ''}</span>
            <div class="post-actions">${postActions}</div>
          </div>
          ${contentHtml}
          <div class="comments-section">
            <button class="comments-toggle" data-action="toggle-comments" data-id="${post.id}" type="button">
              ${commentsOpen ? '收起评论' : `💬 ${comments.length} 条评论`}
            </button>
            ${commentsHtml}
          </div>
        </article>
      `;
    }

    function renderComment(postId, comment) {
      const isEditing = state.editingComment === comment.id;
      const write = canWrite();

      if (isEditing) {
        return `
          <div class="comment-item" data-comment="${comment.id}">
            <div class="comment-body">
              <input type="text" value="${escapeHtml(comment.content)}" data-edit-comment="${comment.id}" maxlength="300"
                style="width:100%;padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.875rem;">
              <div class="edit-actions">
                <button class="btn btn-primary btn-sm" data-action="save-comment" data-post="${postId}" data-id="${comment.id}" type="button">保存</button>
                <button class="btn btn-ghost btn-sm" data-action="cancel-edit" type="button">取消</button>
              </div>
            </div>
          </div>
        `;
      }

      const actions = write ? `
        <div class="comment-actions">
          <button class="btn btn-ghost btn-sm" data-action="edit-comment" data-post="${postId}" data-id="${comment.id}" type="button">编辑</button>
          <button class="btn btn-ghost btn-sm btn-danger" data-action="delete-comment" data-post="${postId}" data-id="${comment.id}" type="button">删</button>
        </div>
      ` : '';

      return `
        <div class="comment-item" data-comment="${comment.id}">
          <div class="comment-body">
            <div class="comment-text">${escapeHtml(comment.content)}</div>
            <div class="comment-time">${formatTime(comment.createdAt)}</div>
          </div>
          ${actions}
        </div>
      `;
    }

    function renderFeed() {
      if (state.displayed.length === 0) {
        const label = getCategoryMeta(state.activeCategory)?.label || '内容';
        feed.innerHTML = `<div class="empty-state"><div class="emoji">🌊</div><p>「${label}」还没有内容，发第一条吧！</p></div>`;
        return;
      }
      feed.innerHTML = state.displayed.map(renderPostCard).join('');
    }

    categoryNav.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-category]');
      if (!btn || btn.dataset.category === state.activeCategory) return;
      setActiveCategory(btn.dataset.category);
    });

    $('btn-add-image').addEventListener('click', () => {
      if (!canWrite()) {
        toast('请先配置 GitHub Token');
        $('settings-modal').classList.add('open');
        return;
      }
      imageInput.click();
    });

    imageInput.addEventListener('change', () => {
      if (imageInput.files?.length) addPendingImages(imageInput.files);
      imageInput.value = '';
    });

    composeImages.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-remove-image]');
      if (!btn) return;
      const index = Number(btn.dataset.removeImage);
      const [removed] = state.pendingImages.splice(index, 1);
      if (removed?.previewUrl) URL.revokeObjectURL(removed.previewUrl);
      renderPendingImages();
      updateComposeState();
    });

    imageLightbox.addEventListener('click', closeLightbox);

    /* ── Event delegation ── */
    feed.addEventListener('click', async (e) => {
      const lightboxLink = e.target.closest('[data-lightbox]');
      if (lightboxLink) {
        e.preventDefault();
        openLightbox(lightboxLink.dataset.lightbox);
        return;
      }

      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;
      const postId = btn.dataset.id || btn.dataset.post;

      if (!canWrite() && !['toggle-comments'].includes(action)) {
        toast('请先配置 GitHub Token');
        $('settings-modal').classList.add('open');
        return;
      }

      if (state.operationActive && !['toggle-comments', 'cancel-edit'].includes(action)) {
        toast('请等待当前操作完成');
        return;
      }

      switch (action) {
        case 'toggle-comments': {
          const id = btn.dataset.id;
          if (state.expandedComments.has(id)) state.expandedComments.delete(id);
          else state.expandedComments.add(id);
          renderFeed();
          break;
        }
        case 'edit-post':
          state.editingPost = postId;
          state.editingComment = null;
          renderFeed();
          break;
        case 'save-post': {
          const textarea = feed.querySelector(`[data-edit-post="${postId}"]`);
          const currentPost = findPost(postId);
          if (!textarea?.value.trim() && !(currentPost?.images?.length)) {
            toast('内容不能为空');
            return;
          }
          btn.disabled = true;
          state.editingPost = null;
          try { await updatePost(postId, textarea.value); }
          catch (err) {
            state.editingPost = postId;
            renderFeed();
            toast(err.message);
          }
          finally { btn.disabled = false; }
          break;
        }
        case 'delete-post':
          btn.disabled = true;
          try { await deletePost(postId); }
          catch (err) { toast(err.message); btn.disabled = false; }
          break;
        case 'add-comment': {
          const input = feed.querySelector(`[data-comment-input="${postId}"]`);
          if (!input?.value.trim()) { toast('评论不能为空'); return; }
          btn.disabled = true;
          try { await addComment(postId, input.value); }
          catch (err) { toast(err.message); }
          finally { btn.disabled = false; }
          break;
        }
        case 'edit-comment':
          state.editingComment = btn.dataset.id;
          state.editingPost = null;
          renderFeed();
          break;
        case 'save-comment': {
          const input = feed.querySelector(`[data-edit-comment="${btn.dataset.id}"]`);
          if (!input?.value.trim()) { toast('评论不能为空'); return; }
          btn.disabled = true;
          const commentId = btn.dataset.id;
          const commentPostId = btn.dataset.post;
          state.editingComment = null;
          try {
            await updateComment(commentPostId, commentId, input.value);
          } catch (err) {
            state.editingComment = commentId;
            renderFeed();
            toast(err.message);
          }
          finally { btn.disabled = false; }
          break;
        }
        case 'delete-comment':
          btn.disabled = true;
          try { await deleteComment(btn.dataset.post, btn.dataset.id); }
          catch (err) { toast(err.message); btn.disabled = false; }
          break;
        case 'cancel-edit':
          state.editingPost = null;
          state.editingComment = null;
          renderFeed();
          break;
      }
    });

    feed.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.matches('[data-comment-input]')) {
        e.preventDefault();
        const postId = e.target.dataset.commentInput;
        const btn = feed.querySelector(`[data-action="add-comment"][data-id="${postId}"]`);
        btn?.click();
      }
    });

    /* ── Compose ── */
    composeInput.addEventListener('input', () => {
      saveComposeDraft();
      updateComposeState();
    });

    window.addEventListener('beforeunload', saveComposeDraft);
    window.addEventListener('pagehide', saveComposeDraft);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') saveComposeDraft();
    });

    btnPost.addEventListener('click', async () => {
      if (!canWrite()) {
        toast('请先配置 GitHub Token');
        $('settings-modal').classList.add('open');
        return;
      }
      const content = composeInput.value.trim();
      const imageFiles = state.pendingImages.map((item) => item.file);
      if (!content && imageFiles.length === 0) return;

      state.loading = true;
      btnPost.disabled = true;
      btnPost.textContent = '发布中…';

      try {
        await createPost(content, imageFiles);
        composeInput.value = '';
        clearComposeDraft();
        clearPendingImages();
        updateComposeState();
      } catch (err) {
        toast(err.message);
      } finally {
        state.loading = false;
        btnPost.textContent = '发布';
        updateComposeState();
      }
    });

    /* ── Settings ── */
    $('btn-settings').addEventListener('click', () => {
      $('token-input').value = getToken();
      $('settings-modal').classList.add('open');
    });

    $('btn-modal-cancel').addEventListener('click', () => {
      $('settings-modal').classList.remove('open');
    });

    $('settings-modal').addEventListener('click', (e) => {
      if (e.target === $('settings-modal')) $('settings-modal').classList.remove('open');
    });

    $('btn-modal-save').addEventListener('click', async () => {
      const token = $('token-input').value.trim();
      if (token) localStorage.setItem(CONFIG.tokenKey, token);
      else localStorage.removeItem(CONFIG.tokenKey);
      state.fileMeta = {};
      $('settings-modal').classList.remove('open');
      updateStatus();
      if (token) {
        try {
          await readFile(CONFIG.recentFile);
          await ensureArchiveLoaded();
        } catch { /* 读取失败不影响保存 token */ }
      }
      toast(token ? 'Token 已保存' : 'Token 已清除');
    });

    $('btn-refresh').addEventListener('click', async () => {
      state.archive = null;
      state.fileMeta = {};
      state.expandedComments.clear();
      await init();
      toast('已刷新');
    });

    $('btn-load-more').addEventListener('click', handleLoadMore);

    /* ── Boot ── */
    init();
  </script>
</body>
</html>
