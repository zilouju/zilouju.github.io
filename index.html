<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="zilouju 夏日小微博">
  <title>夏日小微博 · zilouju</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff9f2;
      --bg-warm: #fff3e6;
      --surface: #ffffff;
      --coral: #ff6b4a;
      --coral-soft: rgba(255, 107, 74, 0.12);
      --teal: #2ec4b6;
      --teal-soft: rgba(46, 196, 182, 0.12);
      --sun: #ffd166;
      --sun-soft: rgba(255, 209, 102, 0.35);
      --sky: #4ecdc4;
      --text: #2d3436;
      --text-muted: #636e72;
      --border: #f0e6dc;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(255, 107, 74, 0.08);
      --shadow-hover: 0 6px 24px rgba(255, 107, 74, 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 90% 5%, var(--sun-soft) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 5% 90%, var(--teal-soft) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0 1.25rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--coral);
    }

    .logo-icon { font-size: 1.5rem; }

    .header-actions { display: flex; gap: 0.5rem; }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      color: var(--text-muted);
    }

    .icon-btn:hover { border-color: var(--coral); color: var(--coral); transform: scale(1.05); }

    /* Compose */
    .compose {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .compose textarea {
      width: 100%;
      min-height: 88px;
      border: none;
      outline: none;
      resize: vertical;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      background: transparent;
    }

    .compose textarea::placeholder { color: #b2bec3; }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .char-count { font-size: 0.8rem; color: var(--text-muted); }

    .btn {
      padding: 0.5rem 1.15rem;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--coral) 0%, #ff8f6b 100%);
      color: #fff;
      box-shadow: 0 3px 12px rgba(255, 107, 74, 0.3);
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(255, 107, 74, 0.4); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }

    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }

    .btn-danger { color: #e17055; border-color: #ffeaa7; }
    .btn-danger:hover { background: #fff5f5; border-color: #e17055; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      border-radius: 10px;
      background: var(--bg-warm);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .status-bar.readonly { background: var(--sun-soft); border-color: #ffe08a; }
    .status-bar.ready { background: var(--teal-soft); border-color: #a8e6cf; color: #00b894; }
    .status-bar.error { background: #ffeef0; border-color: #ffb8c0; color: #d63031; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* Feed */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .feed-title { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }

    .feed-count { font-size: 0.78rem; color: var(--text-muted); }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem;
      margin-bottom: 0.85rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    .post-card:hover { box-shadow: var(--shadow-hover); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .post-time { font-size: 0.78rem; color: var(--text-muted); }

    .post-actions { display: flex; gap: 0.35rem; }

    .post-content {
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.75rem;
    }

    .post-content.editing textarea {
      width: 100%;
      min-height: 72px;
      padding: 0.6rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
    }

    .post-content.editing textarea:focus { border-color: var(--teal); }

    .edit-actions { display: flex; gap: 0.4rem; margin-top: 0.5rem; }

    /* Comments */
    .comments-section { border-top: 1px solid var(--border); padding-top: 0.75rem; }

    .comments-toggle {
      font-size: 0.82rem;
      color: var(--teal);
      cursor: pointer;
      font-weight: 500;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }

    .comments-toggle:hover { text-decoration: underline; }

    .comments-list { margin-top: 0.65rem; }

    .comment-item {
      display: flex;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border-bottom: 1px dashed var(--border);
    }

    .comment-item:last-child { border-bottom: none; }

    .comment-body { flex: 1; min-width: 0; }

    .comment-text { font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; }

    .comment-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }

    .comment-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }

    .comment-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.65rem;
    }

    .comment-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }

    .comment-form input:focus { border-color: var(--teal); }

    /* Load more */
    .load-more-wrap { text-align: center; padding: 0.75rem 0; }

    .load-more-wrap .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 52, 54, 0.35);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s;
    }

    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: min(420px, 100%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      transform: translateY(12px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }

    .modal p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.6; }

    .modal input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      outline: none;
    }

    .modal input:focus { border-color: var(--teal); }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .modal a { color: var(--teal); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      z-index: 300;
      transition: transform 0.3s;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .post-actions .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.72rem; }
      .comment-form { flex-direction: column; }
      .comment-form .btn { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">☀️</span>
        <span>夏日小微博</span>
        <span style="font-size:0.65rem;font-weight:500;color:var(--text-muted);margin-left:0.25rem">v5</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-refresh" title="刷新" type="button">🔄</button>
        <button class="icon-btn" id="btn-settings" title="设置" type="button">⚙️</button>
      </div>
    </header>

    <div class="status-bar readonly" id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">正在加载…</span>
    </div>

    <section class="compose" id="compose-section">
      <textarea id="compose-input" placeholder="分享此刻的想法，像夏日微风一样轻松…" maxlength="500"></textarea>
      <div class="compose-footer">
        <span class="char-count"><span id="char-count">0</span>/500</span>
        <button class="btn btn-primary" id="btn-post" type="button" disabled>发布</button>
      </div>
    </section>

    <section>
      <div class="feed-header">
        <span class="feed-title">动态</span>
        <span class="feed-count" id="feed-count"></span>
      </div>
      <div id="feed"></div>
      <div class="load-more-wrap" id="load-more-wrap" hidden>
        <button class="btn btn-ghost" id="btn-load-more" type="button">加载更多</button>
        <p class="hint" id="load-hint"></p>
      </div>
    </section>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h3>⚙️ 发布设置</h3>
      <p>发帖、评论、编辑和删除需要 GitHub Token，数据保存在仓库的 JSON 文件中。Token 仅存储在本地浏览器，不会上传。</p>
      <p>创建 Token：<a href="https://github.com/settings/tokens/new?scopes=repo&description=weibo-pages" target="_blank" rel="noopener">GitHub → Settings → Tokens</a>，勾选 <strong>repo</strong> 权限。</p>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-modal-cancel" type="button">取消</button>
        <button class="btn btn-primary" id="btn-modal-save" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ── Config ── */
    const CONFIG = {
      owner: 'zilouju',
      repo: 'zilouju.github.io',
      recentFile: 'data/posts-recent.json',
      archiveFile: 'data/posts-archive.json',
      recentLimit: 20,       // recent 文件最多保留条数
      pageSize: 8,           // 首页每页展示条数
      archiveChunk: 10,      // 历史每次加载条数
      tokenKey: 'weibo_github_token',
    };

    /* ── State ── */
    const state = {
      recent: [],
      archive: null,         // null = 未加载
      fileMeta: {},          // path → { sha }
      displayed: [],         // 当前已展示的帖子
      recentShown: 0,
      archiveShown: 0,
      expandedComments: new Set(),
      editingPost: null,
      editingComment: null,
      loading: false,
      archiveLoading: false,
    };

    /* ── DOM ── */
    const $ = (id) => document.getElementById(id);
    const feed = $('feed');
    const composeInput = $('compose-input');
    const btnPost = $('btn-post');
    const statusBar = $('status-bar');
    const statusText = $('status-text');

    /* ── Utils ── */
    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
    }

    function getToken() {
      return localStorage.getItem(CONFIG.tokenKey) || '';
    }

    function canWrite() {
      return !!getToken();
    }

    function toast(msg, duration = 2500) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }

    function formatTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days} 天前`;
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    /** 是否为 UTF-8 被误读为 Latin-1 的乱码（含双重编码的中间态） */
    function looksLikeMojibake(str) {
      return /[\u0080-\u00ff]/.test(str) && !/[\u4e00-\u9fff]/.test(str);
    }

    /** 修复 UTF-8 被误读为 Latin-1 的历史乱码（支持双重编码） */
    function fixMojibake(str) {
      if (!str || /^[\x00-\x7F]*$/.test(str)) return str;
      if (!looksLikeMojibake(str)) return str;
      let cur = str;
      for (let pass = 0; pass < 3; pass++) {
        if (!looksLikeMojibake(cur)) break;
        try {
          const bytes = Uint8Array.from(cur, (c) => c.charCodeAt(0) & 0xff);
          const fixed = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
          if (fixed === cur) break;
          cur = fixed;
        } catch { break; }
      }
      return cur;
    }

    function normalizePosts(posts) {
      return posts.map((p) => ({
        ...p,
        content: fixMojibake(p.content),
        comments: (p.comments || []).map((c) => ({
          ...c,
          content: fixMojibake(c.content),
        })),
      }));
    }

    function updateStatus() {
      if (canWrite()) {
        statusBar.className = 'status-bar ready';
        statusText.textContent = '已连接 · 可以发帖、评论和编辑';
        composeInput.disabled = false;
      } else {
        statusBar.className = 'status-bar readonly';
        statusText.textContent = '只读模式 · 点击 ⚙️ 配置 Token 后可发帖';
        composeInput.disabled = false;
      }
    }

    /* ── UTF-8 Base64（GitHub API 读写中文必用） ── */
    function encodeBase64Utf8(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\n/g, ''));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }

    /* ── Data I/O ── */
    async function fetchJsonLocal(path) {
      const res = await fetch(`./${path}?t=${Date.now()}`);
      if (!res.ok) throw new Error(`无法读取 ${path}`);
      const text = new TextDecoder('utf-8').decode(await res.arrayBuffer());
      return JSON.parse(text);
    }

    async function prefetchFileSha(path) {
      const token = getToken();
      if (!token) return;
      const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
      );
      if (res.ok) {
        const data = await res.json();
        state.fileMeta[path] = { sha: data.sha };
      }
    }

    async function fetchJsonGitHub(path) {
      const token = getToken();
      const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
        { headers: token ? { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } : {} }
      );
      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const data = await res.json();
      state.fileMeta[path] = { sha: data.sha };
      return JSON.parse(decodeBase64Utf8(data.content));
    }

    /** 读取：静态 JSON 优先（UTF-8 可靠）；有 Token 时并行预取 sha 供写入 */
    async function readFile(path) {
      const [data] = await Promise.all([
        fetchJsonLocal(path),
        canWrite() ? prefetchFileSha(path) : Promise.resolve(),
      ]);
      return data;
    }

    /** 有 Token 时从 API 拉最新数据（发帖保存后用，避免 CDN 缓存滞后） */
    async function readFileFresh(path) {
      if (canWrite()) {
        try { return await fetchJsonGitHub(path); }
        catch { /* fallback */ }
      }
      return fetchJsonLocal(path);
    }

    function isShaConflict(message, status) {
      const msg = message || '';
      return status === 409
        || /does not match/i.test(msg)
        || /sha/i.test(msg);
    }

    async function writeFile(path, content, maxRetry = 3) {
      const token = getToken();
      if (!token) throw new Error('请先配置 GitHub Token');

      const payload = encodeBase64Utf8(JSON.stringify(content, null, 2));
      let lastError = '保存失败';

      for (let attempt = 0; attempt < maxRetry; attempt++) {
        if (!state.fileMeta[path]?.sha) {
          await prefetchFileSha(path);
        }

        const body = {
          message: `weibo: update ${path}`,
          content: payload,
        };
        if (state.fileMeta[path]?.sha) body.sha = state.fileMeta[path].sha;

        const res = await fetch(
          `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
              Accept: 'application/vnd.github+json',
            },
            body: JSON.stringify(body),
          }
        );

        if (res.ok) {
          const data = await res.json();
          state.fileMeta[path] = { sha: data.content.sha };
          return;
        }

        const err = await res.json().catch(() => ({}));
        lastError = err.message || `保存失败 (${res.status})`;

        if (!isShaConflict(lastError, res.status) || attempt === maxRetry - 1) {
          throw new Error(lastError);
        }
        delete state.fileMeta[path];
        await new Promise((r) => setTimeout(r, 400 * (attempt + 1)));
      }

      throw new Error(lastError);
    }

    function sortPosts(posts) {
      return [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }

    /* ── Load ── */
    async function loadRecent() {
      state.recent = sortPosts(normalizePosts(await readFile(CONFIG.recentFile)));
    }

    async function loadArchive(silent = false) {
      if (state.archive !== null) return;
      if (!silent) {
        state.archiveLoading = true;
        updateLoadMoreUI();
      }
      try {
        state.archive = sortPosts(normalizePosts(await readFile(CONFIG.archiveFile)));
      } catch {
        state.archive = [];
      }
      if (!silent) {
        state.archiveLoading = false;
      }
    }

    /** 写入前必须加载归档，否则 getAllPosts() 会丢历史数据 */
    async function ensureArchiveLoaded() {
      await loadArchive(true);
    }

    async function getAllPostsForWrite() {
      if (state.archive === null && state.recent.length < CONFIG.recentLimit) {
        return getAllPosts();
      }
      await ensureArchiveLoaded();
      return getAllPosts();
    }

    async function init() {
      statusText.textContent = '正在加载最新动态…';
      try {
        await loadRecent();
        state.recentShown = 0;
        state.archiveShown = 0;
        state.displayed = [];
        renderNextPage();
        updateStatus();
        updateFeedCount();
      } catch (e) {
        statusBar.className = 'status-bar error';
        statusText.textContent = '加载失败：' + e.message;
        feed.innerHTML = `<div class="empty-state"><div class="emoji">😢</div><p>无法加载数据，请稍后刷新</p></div>`;
      }
    }

    /* ── Pagination ── */
    function getTotalCount() {
      const archiveLen = state.archive?.length ?? 0;
      return state.recent.length + archiveLen;
    }

    function renderNextPage() {
      let added = 0;
      const target = CONFIG.pageSize;

      while (added < target && state.recentShown < state.recent.length) {
        state.displayed.push(state.recent[state.recentShown++]);
        added++;
      }

      if (added < target && state.archive) {
        while (added < target && state.archiveShown < state.archive.length) {
          state.displayed.push(state.archive[state.archiveShown++]);
          added++;
        }
      }

      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
    }

    function updateFeedCount() {
      const shown = state.displayed.length;
      const total = state.recent.length + (state.archive?.length ?? 0);
      $('feed-count').textContent = total > 0 ? `已显示 ${shown} / ${total}` : '';
    }

    function updateLoadMoreUI() {
      const wrap = $('load-more-wrap');
      const hasMoreRecent = state.recentShown < state.recent.length;
      const hasArchive = state.recent.length >= CONFIG.recentLimit || (state.archive && state.archiveShown < state.archive.length);
      const archiveNotLoaded = state.archive === null
        && state.recentShown >= state.recent.length
        && state.recent.length >= CONFIG.recentLimit;
      const hasMoreArchive = state.archive && state.archiveShown < state.archive.length;

      if (state.archiveLoading) {
        wrap.hidden = false;
        $('btn-load-more').hidden = true;
        $('load-hint').innerHTML = '<span class="loading"><span class="spinner"></span>正在加载历史记录…</span>';
        return;
      }

      if (hasMoreRecent || hasMoreArchive || archiveNotLoaded) {
        wrap.hidden = false;
        $('btn-load-more').hidden = false;
        if (archiveNotLoaded) {
          $('load-hint').textContent = '历史记录较多，点击后将加载归档内容';
        } else if (hasMoreArchive) {
          $('load-hint').textContent = `历史归档 · 每次加载 ${CONFIG.archiveChunk} 条`;
        } else {
          $('load-hint').textContent = '';
        }
      } else {
        wrap.hidden = state.displayed.length === 0;
        $('btn-load-more').hidden = true;
        $('load-hint').textContent = state.displayed.length > 0 ? '— 已到底啦 —' : '';
      }
    }

    async function handleLoadMore() {
      const hasMoreRecent = state.recentShown < state.recent.length;

      if (hasMoreRecent) {
        renderNextPage();
        return;
      }

      if (state.archive === null) {
        await loadArchive();
        state.archiveShown = 0;
      }

      let added = 0;
      while (added < CONFIG.archiveChunk && state.archiveShown < state.archive.length) {
        state.displayed.push(state.archive[state.archiveShown++]);
        added++;
      }

      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
    }

    /* ── Persist helpers ── */
    function postsEqual(a, b) {
      return JSON.stringify(a || []) === JSON.stringify(b || []);
    }

    function applyPostsToState(recent, archive) {
      state.recent = sortPosts(recent);
      if (archive !== undefined) state.archive = sortPosts(archive);
    }

    function snapshotPostsState() {
      return {
        recent: [...state.recent],
        archive: state.archive === null ? null : [...state.archive],
        displayed: [...state.displayed],
        recentShown: state.recentShown,
        archiveShown: state.archiveShown,
      };
    }

    function restorePostsState(snapshot) {
      state.recent = snapshot.recent;
      state.archive = snapshot.archive;
      state.displayed = snapshot.displayed;
      state.recentShown = snapshot.recentShown;
      state.archiveShown = snapshot.archiveShown;
      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
    }

    async function persistPostFiles(normRecent, normArchive, archiveChanged) {
      await writeFile(CONFIG.recentFile, normRecent);
      if (normArchive !== undefined && archiveChanged) {
        await writeFile(CONFIG.archiveFile, normArchive);
      }
    }

    async function saveAll(recent, archive) {
      const normRecent = normalizePosts(recent);
      const normArchive = archive !== undefined ? normalizePosts(archive) : undefined;
      const archiveChanged = normArchive !== undefined && !postsEqual(normArchive, state.archive);
      await persistPostFiles(normRecent, normArchive, archiveChanged);
      applyPostsToState(normRecent, normArchive);
    }

    function findPost(id) {
      return state.displayed.find(p => p.id === id)
        || state.recent.find(p => p.id === id)
        || (state.archive || []).find(p => p.id === id);
    }

    function getAllPosts() {
      return sortPosts([...state.recent, ...(state.archive || [])]);
    }

    function splitRecentArchive(allPosts) {
      const sorted = sortPosts(allPosts);
      const recent = sorted.slice(0, CONFIG.recentLimit);
      const archive = sorted.slice(CONFIG.recentLimit);
      return { recent, archive };
    }

    async function persistPosts(allPosts) {
      const { recent, archive } = splitRecentArchive(allPosts);
      try {
        await saveAll(recent, archive);
      } catch (err) {
        if (!isShaConflict(err.message)) throw err;
        state.fileMeta = {};
        state.recent = sortPosts(normalizePosts(await readFileFresh(CONFIG.recentFile)));
        if (state.archive !== null) {
          state.archive = sortPosts(normalizePosts(await readFileFresh(CONFIG.archiveFile)));
        }
        const merged = sortPosts([...allPosts, ...getAllPosts()])
          .filter((p, i, arr) => arr.findIndex((x) => x.id === p.id) === i);
        const split = splitRecentArchive(merged);
        await saveAll(split.recent, split.archive);
      }
    }

    /* ── CRUD: Posts ── */
    async function createPost(content) {
      const post = {
        id: uid('post'),
        content: content.trim(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        comments: [],
      };
      const all = [post, ...(await getAllPostsForWrite())];
      const { recent, archive } = splitRecentArchive(all);
      const normRecent = normalizePosts(recent);
      const normArchive = normalizePosts(archive);
      const archiveChanged = !postsEqual(normArchive, state.archive);
      const snapshot = snapshotPostsState();
      const displayCount = state.displayed.length + 1;
      applyPostsToState(normRecent, normArchive);
      reloadViewFromState(displayCount);
      toast('发布成功，正在同步…');

      persistPostFiles(normRecent, normArchive, archiveChanged)
        .then(() => toast('已同步到 GitHub ☀️'))
        .catch((err) => {
          restorePostsState(snapshot);
          toast(`同步失败，已回滚：${err.message}`);
        });
    }

    async function updatePost(id, content) {
      const all = (await getAllPostsForWrite()).map(p =>
        p.id === id ? { ...p, content: content.trim(), updatedAt: new Date().toISOString() } : p
      );
      await persistPosts(all);
      await reloadAndKeepView();
      toast('已更新');
    }

    async function deletePost(id) {
      if (!confirm('确定删除这条动态？评论也会一并删除。')) return;
      const all = (await getAllPostsForWrite()).filter(p => p.id !== id);
      const { recent, archive } = splitRecentArchive(all);
      const normRecent = normalizePosts(recent);
      const normArchive = normalizePosts(archive);
      const archiveChanged = !postsEqual(normArchive, state.archive);
      const snapshot = snapshotPostsState();
      const displayCount = state.displayed.filter(p => p.id !== id).length;
      applyPostsToState(normRecent, normArchive);
      reloadViewFromState(displayCount);
      toast('已删除，正在同步…');

      persistPostFiles(normRecent, normArchive, archiveChanged)
        .then(() => toast('已同步到 GitHub'))
        .catch((err) => {
          restorePostsState(snapshot);
          toast(`同步失败，已回滚：${err.message}`);
        });
    }

    /* ── CRUD: Comments ── */
    async function addComment(postId, content) {
      const all = (await getAllPostsForWrite()).map(p => {
        if (p.id !== postId) return p;
        return {
          ...p,
          comments: [...(p.comments || []), {
            id: uid('cmt'),
            content: content.trim(),
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          }],
        };
      });
      await persistPosts(all);
      await reloadAndKeepView();
      state.expandedComments.add(postId);
      toast('评论成功');
    }

    async function updateComment(postId, commentId, content) {
      const all = (await getAllPostsForWrite()).map(p => {
        if (p.id !== postId) return p;
        return {
          ...p,
          comments: (p.comments || []).map(c =>
            c.id === commentId ? { ...c, content: content.trim(), updatedAt: new Date().toISOString() } : c
          ),
        };
      });
      await persistPosts(all);
      await reloadAndKeepView();
      state.expandedComments.add(postId);
      toast('评论已更新');
    }

    async function deleteComment(postId, commentId) {
      if (!confirm('确定删除这条评论？')) return;
      const all = (await getAllPostsForWrite()).map(p => {
        if (p.id !== postId) return p;
        return { ...p, comments: (p.comments || []).filter(c => c.id !== commentId) };
      });
      await persistPosts(all);
      await reloadAndKeepView();
      state.expandedComments.add(postId);
      toast('评论已删除');
    }

    function reloadViewFromState(count) {
      const all = getAllPosts();
      state.displayed = all.slice(0, count);
      state.recentShown = Math.min(count, state.recent.length);
      state.archiveShown = Math.max(0, count - state.recent.length);
      renderFeed();
      updateLoadMoreUI();
      updateFeedCount();
    }

    async function reloadAndKeepView() {
      const count = state.displayed.length;
      reloadViewFromState(count);
    }

    /* ── Render ── */
    function renderPostCard(post) {
      const isEditing = state.editingPost === post.id;
      const commentsOpen = state.expandedComments.has(post.id);
      const comments = post.comments || [];
      const write = canWrite();

      const postActions = write ? `
        <button class="btn btn-ghost btn-sm" data-action="edit-post" data-id="${post.id}" type="button">编辑</button>
        <button class="btn btn-ghost btn-sm btn-danger" data-action="delete-post" data-id="${post.id}" type="button">删除</button>
      ` : '';

      const contentHtml = isEditing ? `
        <div class="post-content editing">
          <textarea data-edit-post="${post.id}">${escapeHtml(post.content)}</textarea>
          <div class="edit-actions">
            <button class="btn btn-primary btn-sm" data-action="save-post" data-id="${post.id}" type="button">保存</button>
            <button class="btn btn-ghost btn-sm" data-action="cancel-edit" type="button">取消</button>
          </div>
        </div>
      ` : `<div class="post-content">${escapeHtml(post.content)}</div>`;

      const commentsHtml = commentsOpen ? `
        <div class="comments-list">
          ${comments.map(c => renderComment(post.id, c)).join('')}
        </div>
        ${write ? `
          <div class="comment-form">
            <input type="text" placeholder="写评论…" data-comment-input="${post.id}" maxlength="300">
            <button class="btn btn-primary btn-sm" data-action="add-comment" data-id="${post.id}" type="button">发送</button>
          </div>
        ` : ''}
      ` : '';

      return `
        <article class="post-card" data-post="${post.id}">
          <div class="post-meta">
            <span class="post-time">${formatTime(post.updatedAt || post.createdAt)}${post.updatedAt !== post.createdAt ? ' · 已编辑' : ''}</span>
            <div class="post-actions">${postActions}</div>
          </div>
          ${contentHtml}
          <div class="comments-section">
            <button class="comments-toggle" data-action="toggle-comments" data-id="${post.id}" type="button">
              ${commentsOpen ? '收起评论' : `💬 ${comments.length} 条评论`}
            </button>
            ${commentsHtml}
          </div>
        </article>
      `;
    }

    function renderComment(postId, comment) {
      const isEditing = state.editingComment === comment.id;
      const write = canWrite();

      if (isEditing) {
        return `
          <div class="comment-item" data-comment="${comment.id}">
            <div class="comment-body">
              <input type="text" value="${escapeHtml(comment.content)}" data-edit-comment="${comment.id}" maxlength="300"
                style="width:100%;padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.875rem;">
              <div class="edit-actions">
                <button class="btn btn-primary btn-sm" data-action="save-comment" data-post="${postId}" data-id="${comment.id}" type="button">保存</button>
                <button class="btn btn-ghost btn-sm" data-action="cancel-edit" type="button">取消</button>
              </div>
            </div>
          </div>
        `;
      }

      const actions = write ? `
        <div class="comment-actions">
          <button class="btn btn-ghost btn-sm" data-action="edit-comment" data-post="${postId}" data-id="${comment.id}" type="button">编辑</button>
          <button class="btn btn-ghost btn-sm btn-danger" data-action="delete-comment" data-post="${postId}" data-id="${comment.id}" type="button">删</button>
        </div>
      ` : '';

      return `
        <div class="comment-item" data-comment="${comment.id}">
          <div class="comment-body">
            <div class="comment-text">${escapeHtml(comment.content)}</div>
            <div class="comment-time">${formatTime(comment.createdAt)}</div>
          </div>
          ${actions}
        </div>
      `;
    }

    function renderFeed() {
      if (state.displayed.length === 0) {
        feed.innerHTML = `<div class="empty-state"><div class="emoji">🌊</div><p>还没有动态，发第一条吧！</p></div>`;
        return;
      }
      feed.innerHTML = state.displayed.map(renderPostCard).join('');
    }

    /* ── Event delegation ── */
    feed.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;
      const postId = btn.dataset.id || btn.dataset.post;

      if (!canWrite() && !['toggle-comments'].includes(action)) {
        toast('请先配置 GitHub Token');
        $('settings-modal').classList.add('open');
        return;
      }

      switch (action) {
        case 'toggle-comments': {
          const id = btn.dataset.id;
          if (state.expandedComments.has(id)) state.expandedComments.delete(id);
          else state.expandedComments.add(id);
          renderFeed();
          break;
        }
        case 'edit-post':
          state.editingPost = postId;
          state.editingComment = null;
          renderFeed();
          break;
        case 'save-post': {
          const textarea = feed.querySelector(`[data-edit-post="${postId}"]`);
          if (!textarea?.value.trim()) { toast('内容不能为空'); return; }
          btn.disabled = true;
          try { await updatePost(postId, textarea.value); state.editingPost = null; }
          catch (err) { toast(err.message); }
          finally { btn.disabled = false; }
          break;
        }
        case 'delete-post':
          btn.disabled = true;
          try { await deletePost(postId); }
          catch (err) { toast(err.message); btn.disabled = false; }
          break;
        case 'add-comment': {
          const input = feed.querySelector(`[data-comment-input="${postId}"]`);
          if (!input?.value.trim()) { toast('评论不能为空'); return; }
          btn.disabled = true;
          try { await addComment(postId, input.value); }
          catch (err) { toast(err.message); }
          finally { btn.disabled = false; }
          break;
        }
        case 'edit-comment':
          state.editingComment = btn.dataset.id;
          state.editingPost = null;
          renderFeed();
          break;
        case 'save-comment': {
          const input = feed.querySelector(`[data-edit-comment="${btn.dataset.id}"]`);
          if (!input?.value.trim()) { toast('评论不能为空'); return; }
          btn.disabled = true;
          try {
            await updateComment(btn.dataset.post, btn.dataset.id, input.value);
            state.editingComment = null;
          } catch (err) { toast(err.message); }
          finally { btn.disabled = false; }
          break;
        }
        case 'delete-comment':
          btn.disabled = true;
          try { await deleteComment(btn.dataset.post, btn.dataset.id); }
          catch (err) { toast(err.message); btn.disabled = false; }
          break;
        case 'cancel-edit':
          state.editingPost = null;
          state.editingComment = null;
          renderFeed();
          break;
      }
    });

    feed.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.matches('[data-comment-input]')) {
        e.preventDefault();
        const postId = e.target.dataset.commentInput;
        const btn = feed.querySelector(`[data-action="add-comment"][data-id="${postId}"]`);
        btn?.click();
      }
    });

    /* ── Compose ── */
    composeInput.addEventListener('input', () => {
      $('char-count').textContent = composeInput.value.length;
      btnPost.disabled = !composeInput.value.trim() || state.loading;
    });

    btnPost.addEventListener('click', async () => {
      if (!canWrite()) {
        toast('请先配置 GitHub Token');
        $('settings-modal').classList.add('open');
        return;
      }
      const content = composeInput.value.trim();
      if (!content) return;

      state.loading = true;
      btnPost.disabled = true;
      btnPost.textContent = '发布中…';

      try {
        await createPost(content);
        composeInput.value = '';
        $('char-count').textContent = '0';
      } catch (err) {
        toast(err.message);
      } finally {
        state.loading = false;
        btnPost.textContent = '发布';
        btnPost.disabled = !composeInput.value.trim();
      }
    });

    /* ── Settings ── */
    $('btn-settings').addEventListener('click', () => {
      $('token-input').value = getToken();
      $('settings-modal').classList.add('open');
    });

    $('btn-modal-cancel').addEventListener('click', () => {
      $('settings-modal').classList.remove('open');
    });

    $('settings-modal').addEventListener('click', (e) => {
      if (e.target === $('settings-modal')) $('settings-modal').classList.remove('open');
    });

    $('btn-modal-save').addEventListener('click', async () => {
      const token = $('token-input').value.trim();
      if (token) localStorage.setItem(CONFIG.tokenKey, token);
      else localStorage.removeItem(CONFIG.tokenKey);
      state.fileMeta = {};
      $('settings-modal').classList.remove('open');
      updateStatus();
      if (token) {
        try {
          await readFile(CONFIG.recentFile);
          await ensureArchiveLoaded();
        } catch { /* 读取失败不影响保存 token */ }
      }
      toast(token ? 'Token 已保存' : 'Token 已清除');
    });

    $('btn-refresh').addEventListener('click', async () => {
      state.archive = null;
      state.fileMeta = {};
      state.expandedComments.clear();
      await init();
      toast('已刷新');
    });

    $('btn-load-more').addEventListener('click', handleLoadMore);

    /* ── Boot ── */
    init();
  </script>
</body>
</html>
